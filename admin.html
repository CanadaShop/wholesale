<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批發後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #22222a;
    --border: #2e2e38;
    --accent: #7c6af7;
    --accent2: #4fd1c5;
    --danger: #f56565;
    --warn: #f6ad55;
    --success: #68d391;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a72;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* LOGIN */
  #loginScreen {
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; background:var(--bg);
  }
  .login-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:48px 40px; width:380px;
    box-shadow:0 24px 64px rgba(0,0,0,0.5);
  }
  .login-box h1 { font-size:24px; font-weight:700; margin-bottom:8px; }
  .login-box p { color:var(--text2); font-size:14px; margin-bottom:32px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; color:var(--text2); margin-bottom:6px; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:10px 14px; color:var(--text); font-family:inherit;
    font-size:14px; outline:none; transition:border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color:var(--accent);
  }
  .form-group textarea { resize:vertical; min-height:80px; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:10px 20px; border-radius:8px; border:none; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:500; transition:all .2s;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#6b59e8; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger:hover { background:#e53e3e; }
  .btn-success { background:var(--success); color:#0f0f11; }
  .btn-success:hover { background:#48bb78; }
  .btn-warn { background:var(--warn); color:#0f0f11; }
  .btn-warn:hover { background:#ed8936; }
  .btn-ghost {
    background:transparent; color:var(--text2);
    border:1px solid var(--border);
  }
  .btn-ghost:hover { background:var(--surface2); color:var(--text); }
  .btn-sm { padding:6px 12px; font-size:12px; }
  .btn-full { width:100%; }
  .error-msg { color:var(--danger); font-size:13px; margin-top:12px; text-align:center; }

  /* LAYOUT */
  #app { display:none; }
  .layout { display:flex; min-height:100vh; }

  /* SIDEBAR */
  .sidebar {
    width:220px; background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:24px 0; position:fixed;
    top:0; left:0; height:100vh; z-index:100;
  }
  .sidebar-brand {
    padding:0 20px 24px; border-bottom:1px solid var(--border);
    font-size:16px; font-weight:700; color:var(--accent);
    display:flex; align-items:center; gap:8px;
  }
  .sidebar-brand span { font-size:22px; }
  .sidebar-nav { flex:1; padding:16px 0; }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 20px; cursor:pointer; font-size:14px;
    color:var(--text2); transition:all .15s; border-left:3px solid transparent;
  }
  .nav-item:hover { color:var(--text); background:var(--surface2); }
  .nav-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(124,106,247,0.08); }
  .nav-icon { font-size:16px; width:20px; text-align:center; }
  .sidebar-footer {
    padding:16px 20px; border-top:1px solid var(--border);
    font-size:12px; color:var(--text3);
  }

  /* MAIN */
  .main { margin-left:220px; flex:1; padding:32px; }
  .page { display:none; }
  .page.active { display:block; }

  .page-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:28px;
  }
  .page-title { font-size:22px; font-weight:700; }
  .page-subtitle { color:var(--text2); font-size:13px; margin-top:2px; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:20px;
  }
  .stat-label { font-size:12px; color:var(--text2); margin-bottom:8px; }
  .stat-value { font-size:28px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .stat-value.accent { color:var(--accent); }
  .stat-value.success { color:var(--success); }
  .stat-value.warn { color:var(--warn); }
  .stat-value.danger { color:var(--danger); }

  /* TABLE */
  .table-wrap {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  .table-toolbar {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .search-input {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:8px 14px; color:var(--text);
    font-family:inherit; font-size:13px; outline:none; width:240px;
    transition:border-color .2s;
  }
  .search-input:focus { border-color:var(--accent); }
  table { width:100%; border-collapse:collapse; }
  th {
    text-align:left; padding:12px 16px; font-size:12px;
    color:var(--text3); font-weight:500; border-bottom:1px solid var(--border);
    background:var(--surface2); text-transform:uppercase; letter-spacing:.5px;
  }
  td { padding:12px 16px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  .td-actions { display:flex; gap:6px; align-items:center; }

  /* BADGES */
  .badge {
    display:inline-flex; align-items:center; padding:3px 10px;
    border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap;
  }
  .badge-pending { background:rgba(246,173,85,0.15); color:var(--warn); }
  .badge-approved { background:rgba(104,211,145,0.15); color:var(--success); }
  .badge-rejected { background:rgba(245,101,101,0.15); color:var(--danger); }
  .badge-active { background:rgba(79,209,197,0.15); color:var(--accent2); }
  .badge-inactive { background:rgba(90,90,114,0.2); color:var(--text3); }
  .badge-outofstock { background:rgba(245,101,101,0.15); color:var(--danger); }
  .badge-a { background:rgba(124,106,247,0.2); color:var(--accent); }
  .badge-b { background:rgba(79,209,197,0.2); color:var(--accent2); }
  .badge-c { background:rgba(104,211,145,0.2); color:var(--success); }

  /* ORDER STATUS BADGES */
  .badge-waiting { background:rgba(246,173,85,0.15); color:var(--warn); }
  .badge-arrived { background:rgba(79,209,197,0.15); color:var(--accent2); }
  .badge-paid { background:rgba(104,211,145,0.15); color:var(--success); }
  .badge-packing { background:rgba(124,106,247,0.15); color:var(--accent); }
  .badge-shipped { background:rgba(104,211,145,0.3); color:#a8f0c6; }
  .badge-outofstock2 { background:rgba(245,101,101,0.15); color:var(--danger); }

  /* MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.7); z-index:1000;
    align-items:center; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:32px; width:520px; max-width:95vw;
    max-height:90vh; overflow-y:auto;
  }
  .modal h2 { font-size:18px; font-weight:700; margin-bottom:24px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:24px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

  /* EMPTY STATE */
  .empty-state {
    text-align:center; padding:60px 20px; color:var(--text3);
  }
  .empty-state .icon { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  /* ORDER DETAIL */
  .order-items { display:flex; flex-direction:column; gap:8px; margin:16px 0; }
  .order-item {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .order-item-info { flex:1; }
  .order-item-name { font-size:14px; font-weight:500; }
  .order-item-detail { font-size:12px; color:var(--text2); margin-top:2px; }
  .order-item-price { font-size:14px; font-weight:600; font-family:'JetBrains Mono',monospace; white-space:nowrap; }

  .divider { border:none; border-top:1px solid var(--border); margin:16px 0; }

  /* TABS */
  .tabs { display:flex; gap:4px; background:var(--surface2); border-radius:8px; padding:4px; margin-bottom:20px; }
  .tab {
    padding:7px 16px; border-radius:6px; cursor:pointer;
    font-size:13px; color:var(--text2); transition:all .15s; border:none;
    background:transparent; font-family:inherit;
  }
  .tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.3); }

  .loading { text-align:center; padding:40px; color:var(--text2); font-size:14px; }

  /* RECEIPT */
  #receiptCanvas { display:none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>⚡ 批發後台</h1>
    <p>管理員專用登入</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">登入</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand"><span>⚡</span> 批發管理後台</div>
      <nav class="sidebar-nav">
        <div class="nav-item active" onclick="switchPage('dashboard')" id="nav-dashboard">
          <span class="nav-icon">📊</span> 總覽
        </div>
        <div class="nav-item" onclick="switchPage('orders')" id="nav-orders">
          <span class="nav-icon">📦</span> 訂單管理
        </div>
        <div class="nav-item" onclick="switchPage('products')" id="nav-products">
          <span class="nav-icon">🛍️</span> 商品管理
        </div>
        <div class="nav-item" onclick="switchPage('customers')" id="nav-customers">
          <span class="nav-icon">👥</span> 客人管理
        </div>
      </nav>
      <div class="sidebar-footer" id="adminEmail"></div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="page-header">
          <div>
            <div class="page-title">總覽</div>
            <div class="page-subtitle">今日業務狀況一覽</div>
          </div>
          <button class="btn btn-ghost" onclick="loadDashboard()">🔄 重新整理</button>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">待審核客人</div>
            <div class="stat-value warn" id="stat-pending">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">進行中訂單</div>
            <div class="stat-value accent" id="stat-orders">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">上架商品</div>
            <div class="stat-value success" id="stat-products">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">待採買項目</div>
            <div class="stat-value danger" id="stat-waiting">—</div>
          </div>
        </div>
        <div class="table-wrap">
          <div class="table-toolbar">
            <span style="font-size:14px;font-weight:600;">最新訂單</span>
          </div>
          <div id="recentOrders"><div class="loading">載入中…</div></div>
        </div>
      </div>

      <!-- ORDERS -->
      <div class="page" id="page-orders">
        <div class="page-header">
          <div>
            <div class="page-title">訂單管理</div>
            <div class="page-subtitle">查看並處理所有客人訂單</div>
          </div>
        </div>
        <div class="tabs">
          <button class="tab active" onclick="filterOrders('all',this)">全部</button>
          <button class="tab" onclick="filterOrders('待採買',this)">待採買</button>
          <button class="tab" onclick="filterOrders('已到貨',this)">已到貨</button>
          <button class="tab" onclick="filterOrders('已付款',this)">已付款</button>
          <button class="tab" onclick="filterOrders('待出貨',this)">待出貨</button>
          <button class="tab" onclick="filterOrders('已出貨',this)">已出貨</button>
        </div>
        <div class="table-wrap">
          <div class="table-toolbar">
            <input class="search-input" placeholder="搜尋客人姓名…" oninput="searchOrders(this.value)">
            <button class="btn btn-ghost btn-sm" onclick="loadOrders()">🔄 重新整理</button>
          </div>
          <div id="ordersTable"><div class="loading">載入中…</div></div>
        </div>
      </div>

      <!-- PRODUCTS -->
      <div class="page" id="page-products">
        <div class="page-header">
          <div>
            <div class="page-title">商品管理</div>
            <div class="page-subtitle">新增、編輯商品與庫存狀態</div>
          </div>
          <button class="btn btn-primary" onclick="openProductModal()">＋ 新增商品</button>
        </div>
        <div class="table-wrap">
          <div class="table-toolbar">
            <input class="search-input" placeholder="搜尋商品名稱…" oninput="searchProducts(this.value)">
            <button class="btn btn-ghost btn-sm" onclick="loadProducts()">🔄 重新整理</button>
          </div>
          <div id="productsTable"><div class="loading">載入中…</div></div>
        </div>
      </div>

      <!-- CUSTOMERS -->
      <div class="page" id="page-customers">
        <div class="page-header">
          <div>
            <div class="page-title">客人管理</div>
            <div class="page-subtitle">審核新客人、設定級別</div>
          </div>
        </div>
        <div class="tabs">
          <button class="tab active" onclick="filterCustomers('all',this)">全部</button>
          <button class="tab" onclick="filterCustomers('pending',this)">待審核</button>
          <button class="tab" onclick="filterCustomers('approved',this)">已核准</button>
        </div>
        <div class="table-wrap">
          <div id="customersTable"><div class="loading">載入中…</div></div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <h2 id="productModalTitle">新增商品</h2>
    <input type="hidden" id="productId">
    <div class="form-group">
      <label>商品名稱</label>
      <input type="text" id="pName" placeholder="例：棉質圓領上衣">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分類</label>
        <select id="pCategory">
          <option value="衣服">衣服</option>
          <option value="鞋子">鞋子</option>
          <option value="配件">配件</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>狀態</label>
        <select id="pStatus">
          <option value="上架">上架</option>
          <option value="下架">下架</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>尺寸選項（用逗號分隔，留空表示無尺寸）</label>
      <input type="text" id="pSizes" placeholder="例：S,M,L,XL 或 36,37,38,39">
    </div>
    <div class="form-group">
      <label>商品圖片網址（選填）</label>
      <input type="text" id="pImage" placeholder="https://...">
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label>A 級價格</label>
        <input type="number" id="pPriceA" placeholder="0">
      </div>
      <div class="form-group">
        <label>B 級價格</label>
        <input type="number" id="pPriceB" placeholder="0">
      </div>
      <div class="form-group">
        <label>C 級價格</label>
        <input type="number" id="pPriceC" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label>備註（選填）</label>
      <textarea id="pNote" placeholder="商品說明…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('productModal')">取消</button>
      <button class="btn btn-primary" onclick="saveProduct()">儲存商品</button>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="width:600px">
    <h2>訂單明細</h2>
    <div id="orderModalContent"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('orderModal')">關閉</button>
      <button class="btn btn-success" id="btnReceipt" onclick="generateReceipt()" style="display:none">📷 產出明細圖</button>
    </div>
  </div>
</div>

<!-- CUSTOMER MODAL -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <h2>審核客人</h2>
    <div id="customerModalContent"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('customerModal')">取消</button>
      <button class="btn btn-danger" id="btnReject" onclick="reviewCustomer('rejected')">拒絕</button>
      <button class="btn btn-success" id="btnApprove" onclick="reviewCustomer('approved')">核准</button>
    </div>
  </div>
</div>

<canvas id="receiptCanvas"></canvas>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, getDoc, setDoc, addDoc,
  updateDoc, query, where, orderBy, serverTimestamp, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-lk4QYJqTwxMMAcJmOrWUvN-ktfik-fM",
  authDomain: "wholesale-order-42556.firebaseapp.com",
  projectId: "wholesale-order-42556",
  storageBucket: "wholesale-order-42556.firebasestorage.app",
  messagingSenderId: "432348471899",
  appId: "1:432348471899:web:0504fe9a1df06f7da2557e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── STATE ──
let allOrders = [], allProducts = [], allCustomers = [];
let currentOrderFilter = 'all', currentCustomerFilter = 'all';
let currentOrderId = null, currentCustomerId = null;

// ── AUTH ──
window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    document.getElementById('loginError').textContent = '登入失敗，請確認帳號密碼';
  }
};

onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    loadDashboard();
    loadOrders();
    loadProducts();
    loadCustomers();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ── NAVIGATION ──
window.switchPage = (page) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
};

// ── DASHBOARD ──
window.loadDashboard = async () => {
  const [cusSnap, ordSnap, proSnap] = await Promise.all([
    getDocs(collection(db,'customers')),
    getDocs(collection(db,'orders')),
    getDocs(collection(db,'products'))
  ]);

  const pending = cusSnap.docs.filter(d => d.data().status === 'pending').length;
  const activeOrders = ordSnap.docs.filter(d => d.data().orderStatus !== '已出貨').length;
  const activeProducts = proSnap.docs.filter(d => d.data().status === '上架').length;

  // count waiting items across all order details
  let waitingCount = 0;
  for (const o of ordSnap.docs) {
    const detSnap = await getDocs(collection(db,'orders',o.id,'items'));
    waitingCount += detSnap.docs.filter(d => d.data().itemStatus === '待採買').length;
  }

  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-orders').textContent = activeOrders;
  document.getElementById('stat-products').textContent = activeProducts;
  document.getElementById('stat-waiting').textContent = waitingCount;

  // recent orders
  const orders = ordSnap.docs.map(d => ({ id:d.id, ...d.data() }))
    .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0))
    .slice(0,5);

  if (!orders.length) {
    document.getElementById('recentOrders').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>尚無訂單</p></div>';
    return;
  }
  let html = `<table><thead><tr><th>訂單編號</th><th>客人</th><th>下單時間</th><th>狀態</th><th></th></tr></thead><tbody>`;
  for (const o of orders) {
    html += `<tr>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${o.id.slice(-6).toUpperCase()}</td>
      <td>${o.customerName||'—'}</td>
      <td style="color:var(--text2);font-size:12px">${formatDate(o.createdAt)}</td>
      <td>${orderStatusBadge(o.orderStatus)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="switchPage('orders')">查看</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('recentOrders').innerHTML = html;
};

// ── ORDERS ──
window.loadOrders = async () => {
  document.getElementById('ordersTable').innerHTML = '<div class="loading">載入中…</div>';
  const snap = await getDocs(collection(db,'orders'));
  allOrders = snap.docs.map(d => ({ id:d.id, ...d.data() }))
    .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
  renderOrders();
};

window.filterOrders = (status, el) => {
  currentOrderFilter = status;
  document.querySelectorAll('#page-orders .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
};

window.searchOrders = (q) => { renderOrders(q); };

function renderOrders(search='') {
  let orders = allOrders;
  if (currentOrderFilter !== 'all') orders = orders.filter(o => o.orderStatus === currentOrderFilter);
  if (search) orders = orders.filter(o => (o.customerName||'').includes(search));

  if (!orders.length) {
    document.getElementById('ordersTable').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>沒有符合的訂單</p></div>';
    return;
  }
  let html = `<table><thead><tr><th>訂單編號</th><th>客人</th><th>備註</th><th>下單時間</th><th>狀態</th><th>操作</th></tr></thead><tbody>`;
  for (const o of orders) {
    html += `<tr>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${o.id.slice(-6).toUpperCase()}</td>
      <td><strong>${o.customerName||'—'}</strong><div style="font-size:11px;color:var(--text2)">${o.customerEmail||''}</div></td>
      <td style="color:var(--text2);font-size:12px">${o.note||'—'}</td>
      <td style="color:var(--text2);font-size:12px">${formatDate(o.createdAt)}</td>
      <td>${orderStatusBadge(o.orderStatus)}</td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openOrderModal('${o.id}')">查看明細</button>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('ordersTable').innerHTML = html;
}

window.openOrderModal = async (orderId) => {
  currentOrderId = orderId;
  const orderDoc = await getDoc(doc(db,'orders',orderId));
  const order = { id:orderId, ...orderDoc.data() };
  const itemsSnap = await getDocs(collection(db,'orders',orderId,'items'));
  const items = itemsSnap.docs.map(d => ({ id:d.id, ...d.data() }));

  let total = 0;
  items.forEach(i => { if(i.itemStatus !== '斷貨') total += (i.unitPrice||0) * (i.quantity||1); });

  let html = `
    <div style="display:flex;gap:24px;margin-bottom:16px">
      <div><div style="font-size:11px;color:var(--text2)">客人</div><div style="font-weight:600">${order.customerName||'—'}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">訂單狀態</div><div>${orderStatusBadge(order.orderStatus)}</div></div>
      <div><div style="font-size:11px;color:var(--text2)">下單時間</div><div style="font-size:13px">${formatDate(order.createdAt)}</div></div>
    </div>
    ${order.note ? `<div style="background:var(--surface2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:12px">備註：${order.note}</div>` : ''}
    <div class="order-items">`;

  for (const item of items) {
    const subtotal = item.itemStatus !== '斷貨' ? (item.unitPrice||0) * (item.quantity||1) : 0;
    html += `
      <div class="order-item">
        <div class="order-item-info">
          <div class="order-item-name">${item.productName}</div>
          <div class="order-item-detail">尺寸：${item.size||'無'} ｜ 數量：${item.quantity}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${item.itemStatus !== '斷貨' ? `<div class="order-item-price">$${subtotal.toLocaleString()}</div>` : '<div style="color:var(--danger);font-size:12px">斷貨</div>'}
          <select class="btn btn-ghost btn-sm" style="padding:4px 8px" onchange="updateItemStatus('${orderId}','${item.id}',this.value)">
            ${['待採買','已到貨','斷貨','已付款','待出貨','已出貨'].map(s =>
              `<option value="${s}" ${item.itemStatus===s?'selected':''}>${s}</option>`
            ).join('')}
          </select>
        </div>
      </div>`;
  }

  html += `</div>
    <hr class="divider">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:12px;color:var(--text2)">整張訂單狀態</div>
        <select class="btn btn-ghost btn-sm" style="margin-top:4px" onchange="updateOrderStatus('${orderId}',this.value)">
          ${['待採買','已到貨','已付款','待出貨','已出貨'].map(s =>
            `<option value="${s}" ${order.orderStatus===s?'selected':''}>${s}</option>`
          ).join('')}
        </select>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--text2)">總金額（不含斷貨）</div>
        <div style="font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent2)">$${total.toLocaleString()}</div>
      </div>
    </div>`;

  document.getElementById('orderModalContent').innerHTML = html;
  document.getElementById('btnReceipt').style.display = 'inline-flex';
  document.getElementById('orderModal').classList.add('open');

  // store for receipt
  window._currentOrder = { order, items, total };
};

window.updateItemStatus = async (orderId, itemId, status) => {
  await updateDoc(doc(db,'orders',orderId,'items',itemId), { itemStatus: status });
};

window.updateOrderStatus = async (orderId, status) => {
  await updateDoc(doc(db,'orders',orderId), { orderStatus: status });
  const idx = allOrders.findIndex(o => o.id === orderId);
  if (idx >= 0) allOrders[idx].orderStatus = status;
  renderOrders();
};

// ── RECEIPT ──
window.generateReceipt = async () => {
  const { order, items, total } = window._currentOrder;
  const canvas = document.getElementById('receiptCanvas');
  const W = 600;
  const lineH = 28;
  const validItems = items.filter(i => i.itemStatus !== '斷貨');
  const outItems = items.filter(i => i.itemStatus === '斷貨');
  const H = 160 + validItems.length * lineH + (outItems.length ? 40 + outItems.length * lineH : 0) + 80;

  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // bg
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,W,H);

  // header bar
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0,0,W,56);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px "Noto Sans TC", sans-serif';
  ctx.fillText('批發訂單明細', 24, 36);
  ctx.font = '13px "JetBrains Mono", monospace';
  ctx.fillStyle = '#aaaacc';
  ctx.fillText(new Date().toLocaleDateString('zh-TW'), W-120, 36);

  // customer info
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '14px "Noto Sans TC", sans-serif';
  ctx.fillText(`客人：${order.customerName||'—'}`, 24, 82);
  ctx.fillStyle = '#666680';
  ctx.font = '12px "Noto Sans TC", sans-serif';
  ctx.fillText(`訂單編號：${order.id.slice(-6).toUpperCase()}`, 24, 102);

  // divider
  ctx.strokeStyle = '#e0e0f0';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(24, 116); ctx.lineTo(W-24, 116); ctx.stroke();

  // items
  let y = 136;
  ctx.font = '11px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#999';
  ctx.fillText('商品', 24, y);
  ctx.fillText('尺寸', 320, y);
  ctx.fillText('數量', 400, y);
  ctx.fillText('金額', W-60, y);
  y += 18;

  for (const item of validItems) {
    ctx.fillStyle = '#1a1a2e';
    ctx.font = '13px "Noto Sans TC", sans-serif';
    ctx.fillText(item.productName, 24, y);
    ctx.fillText(item.size||'無', 320, y);
    ctx.fillText(item.quantity, 400, y);
    ctx.fillText(`$${((item.unitPrice||0)*(item.quantity||1)).toLocaleString()}`, W-80, y);
    y += lineH;
  }

  if (outItems.length) {
    y += 8;
    ctx.strokeStyle = '#ffdddd';
    ctx.beginPath(); ctx.moveTo(24, y); ctx.lineTo(W-24, y); ctx.stroke();
    y += 18;
    ctx.fillStyle = '#cc4444';
    ctx.font = 'bold 11px "Noto Sans TC", sans-serif';
    ctx.fillText('以下商品斷貨：', 24, y);
    y += lineH;
    for (const item of outItems) {
      ctx.fillStyle = '#cc4444';
      ctx.font = '12px "Noto Sans TC", sans-serif';
      ctx.fillText(`${item.productName}（${item.size||'無'}）x${item.quantity}  斷貨`, 24, y);
      y += lineH;
    }
  }

  // total
  y += 8;
  ctx.fillStyle = '#e8e8f0';
  ctx.fillRect(0, y, W, 56);
  ctx.fillStyle = '#666680';
  ctx.font = '13px "Noto Sans TC", sans-serif';
  ctx.fillText('應付總金額', 24, y+24);
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 22px "JetBrains Mono", monospace';
  ctx.fillText(`$${total.toLocaleString()}`, W-120, y+32);

  canvas.style.display = 'block';
  const link = document.createElement('a');
  link.download = `明細_${order.customerName}_${order.id.slice(-6)}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  canvas.style.display = 'none';
};

// ── PRODUCTS ──
window.loadProducts = async () => {
  document.getElementById('productsTable').innerHTML = '<div class="loading">載入中…</div>';
  const snap = await getDocs(collection(db,'products'));
  allProducts = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  renderProducts();
};

window.searchProducts = (q) => { renderProducts(q); };

function renderProducts(search='') {
  let products = allProducts;
  if (search) products = products.filter(p => p.name?.includes(search));
  if (!products.length) {
    document.getElementById('productsTable').innerHTML = '<div class="empty-state"><div class="icon">🛍️</div><p>尚無商品，點右上角新增</p></div>';
    return;
  }
  let html = `<table><thead><tr><th>商品名稱</th><th>分類</th><th>尺寸</th><th>A級</th><th>B級</th><th>C級</th><th>狀態</th><th>操作</th></tr></thead><tbody>`;
  for (const p of products) {
    html += `<tr>
      <td><strong>${p.name}</strong>${p.note?`<div style="font-size:11px;color:var(--text2)">${p.note}</div>`:''}</td>
      <td>${p.category||'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${p.sizes||'無'}</td>
      <td style="font-family:'JetBrains Mono',monospace">$${p.priceA||0}</td>
      <td style="font-family:'JetBrains Mono',monospace">$${p.priceB||0}</td>
      <td style="font-family:'JetBrains Mono',monospace">$${p.priceC||0}</td>
      <td>${productStatusBadge(p.status)}</td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openProductModal('${p.id}')">編輯</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleProductStatus('${p.id}','${p.status}')">${p.status==='上架'?'下架':'上架'}</button>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('productsTable').innerHTML = html;
}

window.openProductModal = async (id=null) => {
  document.getElementById('productId').value = '';
  document.getElementById('pName').value = '';
  document.getElementById('pCategory').value = '衣服';
  document.getElementById('pSizes').value = '';
  document.getElementById('pImage').value = '';
  document.getElementById('pPriceA').value = '';
  document.getElementById('pPriceB').value = '';
  document.getElementById('pPriceC').value = '';
  document.getElementById('pNote').value = '';
  document.getElementById('pStatus').value = '上架';
  document.getElementById('productModalTitle').textContent = id ? '編輯商品' : '新增商品';

  if (id) {
    const p = allProducts.find(x => x.id === id);
    if (p) {
      document.getElementById('productId').value = p.id;
      document.getElementById('pName').value = p.name||'';
      document.getElementById('pCategory').value = p.category||'衣服';
      document.getElementById('pSizes').value = p.sizes||'';
      document.getElementById('pImage').value = p.imageUrl||'';
      document.getElementById('pPriceA').value = p.priceA||'';
      document.getElementById('pPriceB').value = p.priceB||'';
      document.getElementById('pPriceC').value = p.priceC||'';
      document.getElementById('pNote').value = p.note||'';
      document.getElementById('pStatus').value = p.status||'上架';
    }
  }
  document.getElementById('productModal').classList.add('open');
};

window.saveProduct = async () => {
  const id = document.getElementById('productId').value;
  const data = {
    name: document.getElementById('pName').value.trim(),
    category: document.getElementById('pCategory').value,
    sizes: document.getElementById('pSizes').value.trim(),
    imageUrl: document.getElementById('pImage').value.trim(),
    priceA: Number(document.getElementById('pPriceA').value)||0,
    priceB: Number(document.getElementById('pPriceB').value)||0,
    priceC: Number(document.getElementById('pPriceC').value)||0,
    note: document.getElementById('pNote').value.trim(),
    status: document.getElementById('pStatus').value,
  };
  if (!data.name) { alert('請填寫商品名稱'); return; }
  if (id) {
    await updateDoc(doc(db,'products',id), data);
  } else {
    data.createdAt = serverTimestamp();
    await addDoc(collection(db,'products'), data);
  }
  closeModal('productModal');
  loadProducts();
};

window.toggleProductStatus = async (id, current) => {
  const next = current === '上架' ? '下架' : '上架';
  await updateDoc(doc(db,'products',id), { status: next });
  loadProducts();
};

// ── CUSTOMERS ──
window.loadCustomers = async () => {
  document.getElementById('customersTable').innerHTML = '<div class="loading">載入中…</div>';
  const snap = await getDocs(collection(db,'customers'));
  allCustomers = snap.docs.map(d => ({ id:d.id, ...d.data() }))
    .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
  renderCustomers();
};

window.filterCustomers = (status, el) => {
  currentCustomerFilter = status;
  document.querySelectorAll('#page-customers .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCustomers();
};

function renderCustomers() {
  let custs = allCustomers;
  if (currentCustomerFilter !== 'all') custs = custs.filter(c => c.status === currentCustomerFilter);
  if (!custs.length) {
    document.getElementById('customersTable').innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>沒有符合的客人</p></div>';
    return;
  }
  let html = `<table><thead><tr><th>姓名</th><th>Email</th><th>級別</th><th>狀態</th><th>註冊時間</th><th>操作</th></tr></thead><tbody>`;
  for (const c of custs) {
    html += `<tr>
      <td><strong>${c.name||'—'}</strong></td>
      <td style="font-size:12px;color:var(--text2)">${c.email||'—'}</td>
      <td>${tierBadge(c.tier)}</td>
      <td>${customerStatusBadge(c.status)}</td>
      <td style="font-size:12px;color:var(--text2)">${formatDate(c.createdAt)}</td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openCustomerModal('${c.id}')">管理</button>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('customersTable').innerHTML = html;
}

window.openCustomerModal = (id) => {
  currentCustomerId = id;
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  document.getElementById('customerModalContent').innerHTML = `
    <div style="margin-bottom:20px">
      <div class="form-group"><label>姓名</label><input type="text" id="cName" value="${c.name||''}"></div>
      <div class="form-group"><label>Email</label><input type="text" value="${c.email||''}" disabled style="opacity:.5"></div>
      <div class="form-group">
        <label>級別</label>
        <select id="cTier">
          <option value="A" ${c.tier==='A'?'selected':''}>A 級</option>
          <option value="B" ${c.tier==='B'?'selected':''}>B 級</option>
          <option value="C" ${c.tier==='C'?'selected':''}>C 級</option>
        </select>
      </div>
      <div style="margin-top:8px">${customerStatusBadge(c.status)}</div>
    </div>`;
  document.getElementById('btnApprove').style.display = c.status === 'approved' ? 'none' : 'inline-flex';
  document.getElementById('btnReject').style.display = c.status === 'rejected' ? 'none' : 'inline-flex';
  document.getElementById('customerModal').classList.add('open');
};

window.reviewCustomer = async (status) => {
  const name = document.getElementById('cName').value.trim();
  const tier = document.getElementById('cTier').value;
  await updateDoc(doc(db,'customers',currentCustomerId), { status, tier, name });
  closeModal('customerModal');
  loadCustomers();
  loadDashboard();
};

// ── HELPERS ──
window.closeModal = (id) => { document.getElementById(id).classList.remove('open'); };

function formatDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}

function orderStatusBadge(s) {
  const map = {
    '待採買':'badge-waiting','已到貨':'badge-arrived','已付款':'badge-paid',
    '待出貨':'badge-packing','已出貨':'badge-shipped'
  };
  return `<span class="badge ${map[s]||'badge-waiting'}">${s||'待採買'}</span>`;
}
function productStatusBadge(s) {
  return s === '上架'
    ? '<span class="badge badge-active">上架</span>'
    : '<span class="badge badge-inactive">下架</span>';
}
function customerStatusBadge(s) {
  const map = { pending:'badge-pending', approved:'badge-approved', rejected:'badge-rejected' };
  const label = { pending:'待審核', approved:'已核准', rejected:'已拒絕' };
  return `<span class="badge ${map[s]||'badge-pending'}">${label[s]||s}</span>`;
}
function tierBadge(t) {
  if (!t) return '<span class="badge badge-inactive">未設定</span>';
  return `<span class="badge badge-${t.toLowerCase()}">${t} 級</span>`;
}

// close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target === el) el.classList.remove('open'); });
});
