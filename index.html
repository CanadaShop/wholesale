<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批發下單系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7fb;
    --surface: #ffffff;
    --surface2: #f0f0f7;
    --border: #e2e2ec;
    --accent: #5b4de8;
    --accent2: #38b2ac;
    --danger: #e53e3e;
    --warn: #dd6b20;
    --success: #276749;
    --success-bg: #c6f6d5;
    --text: #1a1a2e;
    --text2: #6b6b8a;
    --text3: #a0a0bc;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* AUTH SCREENS */
  .auth-screen {
    display:none; align-items:center; justify-content:center;
    min-height:100vh; background:linear-gradient(135deg,#667eea22,#764ba222), var(--bg);
  }
  .auth-screen.show { display:flex; }
  .auth-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:40px 36px; width:400px; max-width:95vw;
    box-shadow:0 20px 60px rgba(91,77,232,0.12);
  }
  .auth-logo { font-size:32px; margin-bottom:8px; }
  .auth-box h1 { font-size:22px; font-weight:700; margin-bottom:4px; }
  .auth-box p { color:var(--text2); font-size:13px; margin-bottom:28px; }
  .auth-switch { text-align:center; margin-top:16px; font-size:13px; color:var(--text2); }
  .auth-switch a { color:var(--accent); cursor:pointer; text-decoration:none; }
  .auth-switch a:hover { text-decoration:underline; }

  /* FORMS */
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:5px; font-weight:500; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; background:var(--surface2); border:1.5px solid var(--border);
    border-radius:10px; padding:10px 14px; color:var(--text); font-family:inherit;
    font-size:14px; outline:none; transition:border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color:var(--accent); background:#fff;
  }
  .form-group textarea { resize:vertical; min-height:72px; }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:10px 20px; border-radius:10px; border:none; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:500; transition:all .18s;
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#4a3dd4; transform:translateY(-1px); box-shadow:0 4px 12px rgba(91,77,232,0.3); }
  .btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text2); }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:#fff5f5; border:1.5px solid #fed7d7; color:var(--danger); }
  .btn-danger:hover { background:#fed7d7; }
  .btn-full { width:100%; }
  .btn-sm { padding:6px 12px; font-size:12px; }

  .msg { font-size:13px; margin-top:10px; text-align:center; padding:8px; border-radius:8px; }
  .msg-error { background:#fff5f5; color:var(--danger); }
  .msg-success { background:var(--success-bg); color:var(--success); }
  .msg-warn { background:#fffaf0; color:var(--warn); }

  /* PENDING SCREEN */
  #pendingScreen {
    display:none; align-items:center; justify-content:center;
    min-height:100vh; flex-direction:column; gap:16px; text-align:center; padding:24px;
  }
  #pendingScreen.show { display:flex; }
  .pending-icon { font-size:56px; }
  #pendingScreen h2 { font-size:20px; font-weight:700; }
  #pendingScreen p { color:var(--text2); font-size:14px; max-width:320px; }

  /* APP */
  #app { display:none; }
  #app.show { display:block; }

  /* TOPBAR */
  .topbar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 24px; height:60px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:100;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
  }
  .topbar-brand { font-size:17px; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:6px; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .topbar-user { font-size:13px; color:var(--text2); }
  .cart-btn {
    background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:8px 16px; cursor:pointer; font-size:13px; font-weight:500;
    display:flex; align-items:center; gap:6px; font-family:inherit;
    transition:all .18s;
  }
  .cart-btn:hover { background:#4a3dd4; }
  .cart-count {
    background:#fff; color:var(--accent); border-radius:50%;
    width:18px; height:18px; font-size:11px; font-weight:700;
    display:inline-flex; align-items:center; justify-content:center;
  }

  /* NAV TABS */
  .nav-tabs {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 24px; display:flex; gap:0;
  }
  .nav-tab {
    padding:14px 20px; cursor:pointer; font-size:14px; color:var(--text2);
    border-bottom:2.5px solid transparent; transition:all .15s; font-weight:500;
  }
  .nav-tab:hover { color:var(--text); }
  .nav-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  /* CONTENT */
  .content { max-width:1100px; margin:0 auto; padding:28px 24px; }

  /* PRODUCTS GRID */
  .filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-chip {
    padding:6px 14px; border-radius:20px; border:1.5px solid var(--border);
    cursor:pointer; font-size:13px; color:var(--text2); background:var(--surface);
    transition:all .15s; font-family:inherit;
  }
  .filter-chip:hover { border-color:var(--accent); color:var(--accent); }
  .filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
  .product-card {
    background:var(--surface); border:1.5px solid var(--border); border-radius:16px;
    overflow:hidden; transition:all .2s; cursor:pointer;
  }
  .product-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(91,77,232,0.12); border-color:var(--accent); }
  .product-img {
    width:100%; height:180px; background:var(--surface2);
    display:flex; align-items:center; justify-content:center;
    font-size:48px; overflow:hidden;
  }
  .product-img img { width:100%; height:100%; object-fit:cover; }
  .product-body { padding:14px; }
  .product-name { font-size:15px; font-weight:600; margin-bottom:4px; }
  .product-cat { font-size:11px; color:var(--text3); margin-bottom:8px; }
  .product-price { font-size:18px; font-weight:700; color:var(--accent); font-family:'JetBrains Mono',monospace; }
  .product-sizes { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
  .size-chip {
    padding:3px 8px; border:1.5px solid var(--border); border-radius:6px;
    font-size:11px; cursor:pointer; transition:all .12s; background:var(--surface);
  }
  .size-chip:hover { border-color:var(--accent); color:var(--accent); }
  .size-chip.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
  .add-cart-btn {
    width:100%; margin-top:10px; background:var(--accent); color:#fff;
    border:none; border-radius:8px; padding:8px; font-size:13px;
    cursor:pointer; font-family:inherit; font-weight:500; transition:all .15s;
  }
  .add-cart-btn:hover { background:#4a3dd4; }
  .add-cart-btn:disabled { background:var(--text3); cursor:not-allowed; }
  .qty-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
  .qty-btn {
    width:28px; height:28px; border:1.5px solid var(--border); border-radius:6px;
    background:var(--surface2); cursor:pointer; font-size:16px; font-family:inherit;
    display:flex; align-items:center; justify-content:center; transition:all .12s;
  }
  .qty-btn:hover { border-color:var(--accent); color:var(--accent); }
  .qty-input {
    width:48px; text-align:center; border:1.5px solid var(--border);
    border-radius:6px; padding:4px; font-size:13px; font-family:inherit;
    background:var(--surface); color:var(--text);
  }

  /* CART SIDEBAR */
  .cart-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:200;
  }
  .cart-overlay.open { display:block; }
  .cart-sidebar {
    position:fixed; right:0; top:0; bottom:0; width:380px; max-width:95vw;
    background:var(--surface); box-shadow:-4px 0 24px rgba(0,0,0,0.12);
    z-index:201; display:flex; flex-direction:column; transform:translateX(100%);
    transition:transform .25s ease;
  }
  .cart-sidebar.open { transform:translateX(0); }
  .cart-header {
    padding:20px 24px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .cart-header h3 { font-size:17px; font-weight:700; }
  .cart-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text2); }
  .cart-items { flex:1; overflow-y:auto; padding:16px 24px; }
  .cart-item {
    display:flex; gap:12px; align-items:flex-start;
    padding:12px 0; border-bottom:1px solid var(--border);
  }
  .cart-item:last-child { border-bottom:none; }
  .cart-item-info { flex:1; }
  .cart-item-name { font-size:14px; font-weight:500; }
  .cart-item-detail { font-size:12px; color:var(--text2); margin-top:2px; }
  .cart-item-price { font-size:14px; font-weight:600; font-family:'JetBrains Mono',monospace; white-space:nowrap; }
  .cart-remove { background:none; border:none; color:var(--text3); cursor:pointer; font-size:16px; padding:2px; }
  .cart-remove:hover { color:var(--danger); }
  .cart-footer { padding:16px 24px; border-top:1px solid var(--border); }
  .cart-total { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .cart-total-label { font-size:14px; color:var(--text2); }
  .cart-total-price { font-size:22px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--accent); }
  .cart-note { margin-bottom:12px; }
  .cart-empty { text-align:center; padding:40px 0; color:var(--text3); }
  .cart-empty .icon { font-size:36px; margin-bottom:8px; }

  /* ORDERS */
  .orders-list { display:flex; flex-direction:column; gap:12px; }
  .order-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:14px; overflow:hidden;
  }
  .order-card-header {
    padding:14px 18px; display:flex; align-items:center;
    justify-content:space-between; cursor:pointer; gap:12px;
  }
  .order-card-header:hover { background:var(--surface2); }
  .order-id { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); }
  .order-date { font-size:12px; color:var(--text3); }
  .order-items-list { padding:0 18px 14px; display:none; }
  .order-items-list.open { display:block; }
  .order-item-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 0; border-bottom:1px solid var(--border); gap:12px;
  }
  .order-item-row:last-child { border-bottom:none; }
  .order-item-row-info { flex:1; }
  .order-item-row-name { font-size:13px; font-weight:500; }
  .order-item-row-detail { font-size:11px; color:var(--text2); margin-top:2px; }

  /* BADGES */
  .badge {
    display:inline-flex; align-items:center; padding:3px 10px;
    border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap;
  }
  .badge-waiting { background:#fef3c7; color:#92400e; }
  .badge-arrived { background:#ccfbf1; color:#0f766e; }
  .badge-paid { background:#dcfce7; color:#166534; }
  .badge-packing { background:#ede9fe; color:#5b21b6; }
  .badge-shipped { background:#d1fae5; color:#065f46; }
  .badge-outofstock { background:#fee2e2; color:#991b1b; }

  /* EMPTY */
  .empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
  .empty-state .icon { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  .loading { text-align:center; padding:40px; color:var(--text2); font-size:14px; }

  /* TOAST */
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#1a1a2e; color:#fff; padding:10px 20px; border-radius:10px;
    font-size:13px; z-index:9999; transition:transform .3s ease; pointer-events:none;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- REGISTER -->
<div class="auth-screen" id="registerScreen">
  <div class="auth-box">
    <div class="auth-logo">🛍️</div>
    <h1>申請帳號</h1>
    <p>填寫資料後等待管理員審核，審核通過即可下單</p>
    <div class="form-group"><label>姓名</label><input type="text" id="regName" placeholder="您的姓名"></div>
    <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
    <div class="form-group"><label>密碼</label><input type="password" id="regPassword" placeholder="至少 6 個字元"></div>
    <div class="form-group"><label>確認密碼</label><input type="password" id="regPassword2" placeholder="再輸入一次"></div>
    <button class="btn btn-primary btn-full" onclick="doRegister()">送出申請</button>
    <div class="msg" id="regMsg" style="display:none"></div>
    <div class="auth-switch">已有帳號？<a onclick="showLogin()">登入</a></div>
  </div>
</div>

<!-- LOGIN -->
<div class="auth-screen" id="loginScreen">
  <div class="auth-box">
    <div class="auth-logo">🛍️</div>
    <h1>批發下單系統</h1>
    <p>請登入您的帳號</p>
    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="form-group"><label>密碼</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">登入</button>
    <div class="msg" id="loginMsg" style="display:none"></div>
    <div class="auth-switch">還沒有帳號？<a onclick="showRegister()">申請加入</a></div>
  </div>
</div>

<!-- PENDING -->
<div id="pendingScreen">
  <div class="pending-icon">⏳</div>
  <h2>帳號審核中</h2>
  <p>您的申請已送出，請等待管理員審核。審核通過後即可登入下單。</p>
  <button class="btn btn-outline" onclick="doSignOut()">登出</button>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">🛍️ 批發下單</div>
    <div class="topbar-right">
      <span class="topbar-user" id="userGreeting"></span>
      <button class="cart-btn" onclick="openCart()">
        🛒 購物車 <span class="cart-count" id="cartCount">0</span>
      </button>
      <button class="btn btn-outline btn-sm" onclick="doSignOut()">登出</button>
    </div>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('products',this)" id="tab-products">商品目錄</div>
    <div class="nav-tab" onclick="switchTab('orders',this)" id="tab-orders">我的訂單</div>
  </div>

  <div class="content">
    <!-- PRODUCTS TAB -->
    <div id="tabProducts">
      <div class="filters" id="categoryFilters">
        <button class="filter-chip active" onclick="filterCategory('全部',this)">全部</button>
        <button class="filter-chip" onclick="filterCategory('衣服',this)">衣服</button>
        <button class="filter-chip" onclick="filterCategory('鞋子',this)">鞋子</button>
        <button class="filter-chip" onclick="filterCategory('配件',this)">配件</button>
        <button class="filter-chip" onclick="filterCategory('其他',this)">其他</button>
      </div>
      <div class="products-grid" id="productsGrid">
        <div class="loading">載入中…</div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tabOrders" style="display:none">
      <div class="orders-list" id="ordersList">
        <div class="loading">載入中…</div>
      </div>
    </div>
  </div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>🛒 購物車</h3>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-label">合計</span>
      <span class="cart-total-price" id="cartTotal">$0</span>
    </div>
    <div class="cart-note form-group">
      <label>備註（選填）</label>
      <textarea id="orderNote" placeholder="特殊需求、備註…" style="min-height:56px"></textarea>
    </div>
    <button class="btn btn-primary btn-full" onclick="submitOrder()">確認下單</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, getDoc, addDoc,
  query, where, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-lk4QYJqTwxMMAcJmOrWUvN-ktfik-fM",
  authDomain: "wholesale-order-42556.firebaseapp.com",
  projectId: "wholesale-order-42556",
  storageBucket: "wholesale-order-42556.firebasestorage.app",
  messagingSenderId: "432348471899",
  appId: "1:432348471899:web:0504fe9a1df06f7da2557e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── STATE ──
let currentUser = null, customerData = null;
let allProducts = [], cart = [], currentCategory = '全部';

// ── SCREEN HELPERS ──
function showScreen(name) {
  document.getElementById('registerScreen').classList.remove('show');
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('pendingScreen').classList.remove('show');
  document.getElementById('app').classList.remove('show');
  if (name === 'register') document.getElementById('registerScreen').classList.add('show');
  else if (name === 'login') document.getElementById('loginScreen').classList.add('show');
  else if (name === 'pending') document.getElementById('pendingScreen').classList.add('show');
  else if (name === 'app') document.getElementById('app').classList.add('show');
}

window.showLogin = () => showScreen('login');
window.showRegister = () => showScreen('register');

// ── AUTH ──
onAuthStateChanged(auth, async user => {
  if (!user) { showScreen('login'); return; }
  currentUser = user;
  // check if admin
  // load customer doc
  const snap = await getDocs(query(collection(db,'customers'), where('uid','==',user.uid)));
  if (snap.empty) {
    // might be admin — just show pending or login
    showScreen('login');
    return;
  }
  customerData = { id: snap.docs[0].id, ...snap.docs[0].data() };
  if (customerData.status === 'pending') {
    showScreen('pending');
  } else if (customerData.status === 'approved') {
    showScreen('app');
    document.getElementById('userGreeting').textContent = `Hi, ${customerData.name}`;
    loadProducts();
    loadOrders();
  } else {
    showMsg('loginMsg','error','您的帳號申請已被拒絕，請聯繫管理員');
    showScreen('login');
    await signOut(auth);
  }
});

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  hideMsg('loginMsg');
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    showMsg('loginMsg','error','帳號或密碼錯誤');
  }
};

window.doRegister = async () => {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw = document.getElementById('regPassword').value;
  const pw2 = document.getElementById('regPassword2').value;
  hideMsg('regMsg');
  if (!name || !email || !pw) { showMsg('regMsg','error','請填寫所有欄位'); return; }
  if (pw !== pw2) { showMsg('regMsg','error','兩次密碼不一致'); return; }
  if (pw.length < 6) { showMsg('regMsg','error','密碼至少 6 個字元'); return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await addDoc(collection(db,'customers'), {
      uid: cred.user.uid, name, email,
      tier: 'B', status: 'pending',
      createdAt: serverTimestamp()
    });
    showMsg('regMsg','success','申請已送出！請等待管理員審核');
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') showMsg('regMsg','error','此 Email 已被使用');
    else showMsg('regMsg','error','註冊失敗，請稍後再試');
  }
};

window.doSignOut = async () => {
  await signOut(auth);
  cart = [];
  updateCartCount();
};

// ── TABS ──
window.switchTab = (tab, el) => {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabProducts').style.display = tab === 'products' ? 'block' : 'none';
  document.getElementById('tabOrders').style.display = tab === 'orders' ? 'block' : 'none';
};

// ── PRODUCTS ──
window.loadProducts = async () => {
  document.getElementById('productsGrid').innerHTML = '<div class="loading">載入商品中…</div>';
  const snap = await getDocs(query(collection(db,'products')));
  allProducts = snap.docs
    .map(d => ({ id:d.id, ...d.data() }))
    .filter(p => p.status === '上架');
  renderProducts();
};

window.filterCategory = (cat, el) => {
  currentCategory = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
};

function getPrice(p) {
  const tier = customerData?.tier || 'B';
  if (tier === 'A') return p.priceA || 0;
  if (tier === 'C') return p.priceC || 0;
  return p.priceB || 0;
}

function renderProducts() {
  let products = allProducts;
  if (currentCategory !== '全部') products = products.filter(p => p.category === currentCategory);
  if (!products.length) {
    document.getElementById('productsGrid').innerHTML = '<div class="empty-state"><div class="icon">🛍️</div><p>此分類暫無商品</p></div>';
    return;
  }
  document.getElementById('productsGrid').innerHTML = products.map(p => {
    const price = getPrice(p);
    const sizes = p.sizes ? p.sizes.split(',').map(s=>s.trim()).filter(Boolean) : [];
    return `
      <div class="product-card" data-id="${p.id}">
        <div class="product-img">
          ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" onerror="this.parentNode.innerHTML='🛍️'">` : getCategoryIcon(p.category)}
        </div>
        <div class="product-body">
          <div class="product-name">${p.name}</div>
          <div class="product-cat">${p.category}</div>
          <div class="product-price">$${price.toLocaleString()}</div>
          ${sizes.length ? `
            <div class="product-sizes" id="sizes-${p.id}">
              ${sizes.map(s => `<div class="size-chip" onclick="selectSize('${p.id}','${s}',this)">${s}</div>`).join('')}
            </div>` : ''}
          <div class="qty-row">
            <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
            <input class="qty-input" type="number" min="1" value="1" id="qty-${p.id}">
            <button class="qty-btn" onclick="changeQty('${p.id}',1)">＋</button>
          </div>
          <button class="add-cart-btn" onclick="addToCart('${p.id}')"
            ${sizes.length ? 'disabled id="addbtn-'+p.id+'"' : ''}>
            ${sizes.length ? '請先選擇尺寸' : '＋ 加入購物車'}
          </button>
        </div>
      </div>`;
  }).join('');
}

function getCategoryIcon(cat) {
  if (cat === '衣服') return '👕';
  if (cat === '鞋子') return '👟';
  if (cat === '配件') return '👜';
  return '🛍️';
}

window.selectSize = (pid, size, el) => {
  document.querySelectorAll(`#sizes-${pid} .size-chip`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.selected = 'true';
  const btn = document.getElementById('addbtn-'+pid);
  if (btn) { btn.disabled = false; btn.textContent = '＋ 加入購物車'; }
};

window.changeQty = (pid, delta) => {
  const input = document.getElementById('qty-'+pid);
  const val = Math.max(1, (parseInt(input.value)||1) + delta);
  input.value = val;
};

window.addToCart = (pid) => {
  const p = allProducts.find(x => x.id === pid);
  if (!p) return;
  const sizes = p.sizes ? p.sizes.split(',').map(s=>s.trim()).filter(Boolean) : [];
  let selectedSize = '';
  if (sizes.length) {
    const sel = document.querySelector(`#sizes-${pid} .size-chip.selected`);
    if (!sel) { toast('請先選擇尺寸'); return; }
    selectedSize = sel.textContent;
  }
  const qty = parseInt(document.getElementById('qty-'+pid).value) || 1;
  const price = getPrice(p);
  // check if same item+size already in cart
  const existing = cart.find(c => c.productId === pid && c.size === selectedSize);
  if (existing) { existing.quantity += qty; }
  else {
    cart.push({ productId:pid, productName:p.name, size:selectedSize, quantity:qty, unitPrice:price });
  }
  updateCartCount();
  toast(`已加入購物車：${p.name}${selectedSize?' ('+selectedSize+')':''}`);
};

// ── CART ──
function updateCartCount() {
  const total = cart.reduce((s,i) => s+i.quantity, 0);
  document.getElementById('cartCount').textContent = total;
}

window.openCart = () => {
  renderCart();
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartSidebar').classList.add('open');
};

window.closeCart = () => {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartSidebar').classList.remove('open');
};

function renderCart() {
  if (!cart.length) {
    document.getElementById('cartItems').innerHTML = '<div class="cart-empty"><div class="icon">🛒</div><p>購物車是空的</p></div>';
    document.getElementById('cartTotal').textContent = '$0';
    return;
  }
  let total = 0;
  document.getElementById('cartItems').innerHTML = cart.map((item, idx) => {
    const sub = item.unitPrice * item.quantity;
    total += sub;
    return `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.productName}</div>
          <div class="cart-item-detail">
            ${item.size ? '尺寸：'+item.size+' ｜ ' : ''}數量：${item.quantity}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="cart-item-price">$${sub.toLocaleString()}</div>
          <button class="cart-remove" onclick="removeCartItem(${idx})">✕</button>
        </div>
      </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = '$' + total.toLocaleString();
}

window.removeCartItem = (idx) => {
  cart.splice(idx, 1);
  updateCartCount();
  renderCart();
};

window.submitOrder = async () => {
  if (!cart.length) { toast('購物車是空的'); return; }
  const note = document.getElementById('orderNote').value.trim();
  try {
    const orderRef = await addDoc(collection(db,'orders'), {
      customerId: customerData.id,
      customerName: customerData.name,
      customerEmail: customerData.email,
      note,
      orderStatus: '待採買',
      createdAt: serverTimestamp()
    });
    for (const item of cart) {
      await addDoc(collection(db,'orders',orderRef.id,'items'), {
        ...item,
        itemStatus: '待採買'
      });
    }
    cart = [];
    updateCartCount();
    closeCart();
    document.getElementById('orderNote').value = '';
    toast('✅ 訂單已送出！');
    loadOrders();
    switchTab('orders', document.getElementById('tab-orders'));
  } catch(e) {
    toast('下單失敗，請稍後再試');
  }
};

// ── ORDERS ──
window.loadOrders = async () => {
  if (!customerData) return;
  document.getElementById('ordersList').innerHTML = '<div class="loading">載入訂單…</div>';
  const snap = await getDocs(query(collection(db,'orders'), where('customerId','==',customerData.id)));
  const orders = snap.docs.map(d => ({ id:d.id, ...d.data() }))
    .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

  if (!orders.length) {
    document.getElementById('ordersList').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>尚無訂單紀錄</p></div>';
    return;
  }

  // load items for each order
  const rendered = await Promise.all(orders.map(async o => {
    const itemsSnap = await getDocs(collection(db,'orders',o.id,'items'));
    const items = itemsSnap.docs.map(d => ({ id:d.id, ...d.data() }));
    let total = 0;
    items.forEach(i => { if(i.itemStatus !== '斷貨') total += (i.unitPrice||0)*(i.quantity||1); });
    return { order:o, items, total };
  }));

  document.getElementById('ordersList').innerHTML = rendered.map(({ order, items, total }) => `
    <div class="order-card">
      <div class="order-card-header" onclick="toggleOrder('${order.id}')">
        <div>
          <div style="font-weight:600;font-size:14px">訂單 #${order.id.slice(-6).toUpperCase()}</div>
          <div class="order-date">${formatDate(order.createdAt)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600">$${total.toLocaleString()}</div>
          ${orderStatusBadge(order.orderStatus)}
          <span style="color:var(--text3);font-size:18px">›</span>
        </div>
      </div>
      <div class="order-items-list" id="orderItems-${order.id}">
        ${items.map(item => `
          <div class="order-item-row">
            <div class="order-item-row-info">
              <div class="order-item-row-name">${item.productName}</div>
              <div class="order-item-row-detail">${item.size?'尺寸：'+item.size+' ｜ ':''}數量：${item.quantity}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              ${item.itemStatus !== '斷貨'
                ? `<div style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600">$${((item.unitPrice||0)*(item.quantity||1)).toLocaleString()}</div>`
                : ''}
              ${itemStatusBadge(item.itemStatus)}
            </div>
          </div>`).join('')}
        ${order.note ? `<div style="margin-top:8px;font-size:12px;color:var(--text2)">備註：${order.note}</div>` : ''}
      </div>
    </div>`).join('');
};

window.toggleOrder = (id) => {
  const el = document.getElementById('orderItems-'+id);
  el.classList.toggle('open');
};

// ── HELPERS ──
function formatDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}

function orderStatusBadge(s) {
  const map = { '待採買':'badge-waiting','已到貨':'badge-arrived','已付款':'badge-paid','待出貨':'badge-packing','已出貨':'badge-shipped' };
  return `<span class="badge ${map[s]||'badge-waiting'}">${s||'待採買'}</span>`;
}

function itemStatusBadge(s) {
  const map = { '待採買':'badge-waiting','已到貨':'badge-arrived','已付款':'badge-paid','待出貨':'badge-packing','已出貨':'badge-shipped','斷貨':'badge-outofstock' };
  return `<span class="badge ${map[s]||'badge-waiting'}">${s}</span>`;
}

function showMsg(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'msg msg-' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
window.toast = toast;
</script>
</body>
</html>
